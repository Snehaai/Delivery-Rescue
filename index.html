  const logRef = useRef(null);
  const selected = orders.find((o) => o.id === selectedId);
  useEffect(() => {
    return () => {
      timers.current.forEach(clearTimeout);

  }, []);

    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

    const rescued = orders.filter((o) => o.status === "rescued").length;
    const pending = orders.filter((o) => o.status === "pending").length;
    const escalated = orders.filter((o) => o.status === "escalated").length;
    return { total: orders.length, rescued, pending, escalated };
  }, [orders]);

    if (running) return;
    setSelectedId(id);

    setGpsConfirmed(false);
    setConfidence(0);
    setStateFields({});
  }
  function resetAll() {
    if (running) return;
    resetRun();
    setOrders(SCENARIOS.map((s) => ({ ...s, status: "pending" })));
    setSession({ rescued: 0, saved: 0, avg: 90 });
  }
  function startRescue() {
    if (running || !selected) return;
    resetRun();
    setRunning(true);
    const steps = selected.steps;
    let acc = 0;
    steps.forEach((step, i) => {
      const delay = 1e3 + Math.random() * 400;
      acc += delay;
      const t = window.setTimeout(() => {
        setStepIdx(i);
        setActiveNode(step.node);
        setLogs((prev) => [...prev, { ...step, key: Date.now() + "-" + i }]);
        setCompletedNodes((prev) => {
          const nx = new Set(prev);
          if (i > 0) nx.add(steps[i - 1].node);
          return nx;
        });
        setStateFields((prev) => {
          const nx = { ...prev };
          if (step.agent === "voice") nx.voice_transcript = selected.state.voice_transcript;
          if (step.agent === "spatial") nx.extracted_landmarks = selected.state.extracted_landmarks;
          if (step.node === "spatial" && /Geocoded/.test(step.label)) {
            nx.final_gps = selected.state.final_gps;
            setGpsConfirmed(true);
          }
          if (step.agent === "route") {
            nx.confidence_score = selected.finalConfidence / 100;
            animateConfidence(selected.finalConfidence);
          }
          if (step.node === "resolved") nx.status = selected.state.status;
          return nx;
        });
      }, acc);
      timers.current.push(t);
    });
    const done = window.setTimeout(() => {
      setCompletedNodes((prev) => {
        const nx = new Set(prev);
        steps.forEach((s) => nx.add(s.node));
        return nx;
      });
      setActiveNode(null);
      setRunning(false);

      }
    }, acc + 600);

  }

      cur += Math.max(1, Math.round((target - cur) / 6));
      if (cur >= target) {
        setConfidence(target);
        return;
      }
      setConfidence(cur);
      const t = window.setTimeout(step, 40);
      timers.current.push(t);
    };
    step();
  }

        @keyframes pulseRing{ 0%{box-shadow:0 0 0 0 rgba(155,47,203,.55)} 70%{box-shadow:0 0 0 14px rgba(155,47,203,0)} 100%{box-shadow:0 0 0 0 rgba(155,47,203,0)} }

        @keyframes dotPulse{ 0%,100%{opacity:.35} 50%{opacity:1} }

        .flow-arrow.active{ background:linear-gradient(90deg,#9B2FCB,#F43397); animation:flowMove 1s linear infinite; }
        .flow-arrow.active::after{ content:""; position:absolute; right:-6px; top:-4px; border-left:8px solid #F43397; border-top:5px solid transparent; border-bottom:5px solid transparent; }

      `}</style>

}
function ConfidenceCard({ value }) {
  const pct = value / 100;
  const sweep = 240;
  const angle = -120 + sweep * pct;
  const r = 60, cx = 80, cy = 80;
  const start = polar(cx, cy, r, -120);
  const end = polar(cx, cy, r, angle);
  const large = sweep * pct > 180 ? 1 : 0;
  const path = value > 0 ? `M ${start.x} ${start.y} A ${r} ${r} 0 ${large} 1 ${end.x} ${end.y}` : "";
  const zone = value < 50 ? "escalate" : value < 75 ? "flag" : "push";
  const color = value < 50 ? "#E53935" : value < 75 ? "#FF8C00" : "#00A86B";
  return <div className="meesho-card p-4">
      <div className="font-bold mb-2" style={{ color: "var(--meesho-primary)" }}>
        Confidence Score
      </div>
      <div className="relative flex justify-center">
        <svg width="160" height="120" viewBox="0 0 160 120">
          <defs>
            <linearGradient id="arcGrad" x1="0" x2="1">
              <stop offset="0%" stopColor="#E53935" />
              <stop offset="50%" stopColor="#FF8C00" />
              <stop offset="100%" stopColor="#00A86B" />
            </linearGradient>
          </defs>
          <path
    d={`M ${polar(cx, cy, r, -120).x} ${polar(cx, cy, r, -120).y} A ${r} ${r} 0 1 1 ${polar(cx, cy, r, 120).x} ${polar(cx, cy, r, 120).y}`}
    fill="none"
    stroke="#F1E5FA"
    strokeWidth="14"
    strokeLinecap="round"
  />
          {value > 0 && <path d={path} fill="none" stroke="url(#arcGrad)" strokeWidth="14" strokeLinecap="round" />}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-3xl font-black" style={{ color }}>
            {value}%
          </div>
          <div className="text-[10px] uppercase font-bold tracking-widest" style={{ color: "var(--meesho-muted)" }}>
            confidence
          </div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-1 mt-2 text-[10px] font-semibold text-center">
        <div className="rounded-md py-1" style={{ background: zone === "escalate" ? "#E5393522" : "#FAFAFA", color: "#E53935" }}>
          Escalate &lt;50%
        </div>
        <div className="rounded-md py-1" style={{ background: zone === "flag" ? "#FF8C0022" : "#FAFAFA", color: "#FF8C00" }}>
          Flag 50-75%
        </div>
        <div className="rounded-md py-1" style={{ background: zone === "push" ? "#00A86B22" : "#FAFAFA", color: "#00A86B" }}>
          Auto-push ≥75%
        </div>
      </div>
    </div>;
}
function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function ImpactCard({ session }) {

      </div>
    </div>;
}
function JsonPanel({

  const stepsByAgent = ["voice", "spatial", "route"];
  const buildState = (agent) => {
    if (!selected) return {};
    if (agent === "voice") return { voice_transcript: selected.state.voice_transcript, language: selected.lang };
    if (agent === "spatial") return { extracted_landmarks: selected.state.extracted_landmarks, candidate_gps: selected.state.final_gps };
    if (agent === "route") return { confidence_score: selected.state.confidence_score, status: selected.state.status, ...selected.state.iterations ? { iterations: selected.state.iterations } : {} };

    style={{ background: AGENT_COLORS[a] }}
  >
                {a} agent
              </div>
              <pre className="code-block p-3 text-[11px] meesho-mono overflow-auto">{prettyJson(buildState(a))}</pre>
            </div>)}
        </div>}
    </div>;
}
function prettyJson(obj) {
  const j = JSON.stringify(obj, null, 2);
  const parts = [];
  j.split("\n").forEach((line, i) => {
    const m = line.match(/^(\s*)"([^"]+)":\s*(.*)$/);
    if (m) {
      const val = m[3];
      let cls = "v";
      if (/^\d/.test(val)) cls = "n";
      if (/^\[/.test(val)) cls = "s";
      parts.push(
        <div key={i}>
          {m[1]}
          <span className="k">"{m[2]}"</span>: <span className={cls}>{val}</span>
        </div>
      );
    } else {
      parts.push(<div key={i}>{line}</div>);
    }
  });
  return parts;
}
